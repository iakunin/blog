baseURL: 'https://iakunin.dev/'
languageCode: en-us
defaultContentLanguage: en
theme:
  - github.com/Mitrichius/hugo-theme-anubis
paginate: 10
googleAnalytics: 'G-D1LWP5YCGC'
enableRobotsTXT: true

params:
  authorEmail: &authorEmail 'yakuninm+blog@gmail.com'
  dateFormat: '2006-01-02'
  paginationSinglePost: true
  style: auto
  readMore: true
  utterancesRepo: ''
  utterancesTheme: ''
  utterancesIssue: ''
  utterancesLabel: ''
  social:
    - id: github
      name: iakunin
    - id: telegram
      name: iakunin
    - id: email
      name: *authorEmail

languages:
  en:
    languageName: English
    title: Maksim Iakunin's blog
    disqusShortname: 'iakunin-dev-en'
    params:
      author: Maksim Iakunin
      description: Maksim Iakunin blogging about software development.
    menu:
      main:
        - identifier: about
          name: About
          url: /about/
          weight: 1
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 2
        - name: Archive
          identifier: archive
          url: /posts/
          weight: 3
  ru:
    languageName: Русский
    title: Блог Максима Якунина
    disqusShortname: 'iakunin-dev-ru'
    params:
      author: Максим Якунин
      description: Максим Якунин ведет блог о разработке программного обеспечения.
    menu:
      main:
        - identifier: about
          name: Обо мне
          url: /about/
          weight: 1
        - identifier: tags
          name: Теги
          url: /tags/
          weight: 2
        - identifier: archive
          name: Архив
          url: /posts/
          weight: 3

taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
